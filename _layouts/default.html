<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="Custom description of your website">

    <!-- Additional meta tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#157878">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Custom stylesheets -->
    <link rel="stylesheet" href="{{ '/assets/css/custom-style.css?v=' | append: site.github.build_revision | relative_url }}">

    <!-- Additional scripts or styles -->
    {% include head-custom.html %}
  </head>
  <body>
    <a id="skip-to-content" href="#content">Skip to the content.</a>

    <header class="page-header" role="banner">
      <h1 class="project-name">Arel Akaunu's Portfolio</h1>
      <h2 class="project-tagline">Exploring Data Science, Coding, and Insights</h2>
      <nav>
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/blog">Blog</a></li>
          <li><a href="/projects">Projects</a></li>
          <li><a href="/about">About</a></li>
          <li><a href="/contact">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main id="content" class="main-content" role="main">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container">
        <div class="row">
          <div class="col-md-6">
            <p>&copy; 2024 Arel Akaunu. All rights reserved.</p>
          </div>
          <div class="col-md-6">
            <p>This website was built with <a href="https://jekyllrb.com/">Jekyll</a> and hosted on <a href="https://pages.github.com/">GitHub Pages</a>.</p>
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>
